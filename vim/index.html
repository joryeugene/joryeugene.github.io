<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vim - jorypestorious.com</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0c0c0c;
      color: #cdd6f4;
      font-family: 'SF Mono', Monaco, Consolas, 'Courier New', monospace;
      font-size: 14px;
      line-height: 21px;
      overflow: hidden;
    }

    #vim-editor {
      display: flex;
      flex-direction: column;
      height: 100vh;
      animation: vim-fadein 0.25s ease-in;
    }

    @keyframes vim-fadein {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #vim-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      display: flex;
      min-height: 0;
    }

    #vim-gutter {
      display: block;
      min-width: 2ch;
      padding: 0 8px 0 0;
      text-align: left;
      color: rgba(255,255,255,0.25);
      user-select: none;
      flex-shrink: 0;
      background: #0c0c0c;
      white-space: pre;
      font: inherit;
    }

    #vim-lines-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    #vim-editor.zen #vim-lines-wrap {
      flex: none;
      width: 65ch;
      max-width: 100%;
      margin: 0 auto;
    }

    #vim-content {
      margin: 0;
      padding: 0 0 0 8px;
      white-space: pre;
      min-height: 100%;
      font: inherit;
    }

    #vim-editor.zen #vim-content {
      line-height: 24px;
    }

    #vim-cursor {
      position: absolute;
      background: rgba(205, 214, 244, 0.85);
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 1;
    }

    #vim-cmdline {
      min-height: 21px;
      padding: 0 8px;
      font: inherit;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      flex-shrink: 0;
    }

    #vim-statusbar {
      background: rgba(255,255,255,0.12);
      display: flex;
      justify-content: space-between;
      padding: 2px 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      flex-shrink: 0;
      user-select: none;
    }

    mark {
      background: var(--vim-mark, rgba(255, 200, 0, 0.35));
      color: inherit;
    }

    .vsel {
      background: var(--vim-sel, rgba(100, 150, 255, 0.4));
      color: inherit;
    }
  </style>
</head>
<body>
  <div id="vim-editor">
    <div id="vim-body">
      <div id="vim-gutter"></div>
      <div id="vim-lines-wrap">
        <pre id="vim-content"></pre>
        <div id="vim-cursor"></div>
      </div>
    </div>
    <div id="vim-cmdline"></div>
    <div id="vim-statusbar">
      <span id="vim-status-mode"></span>
      <span id="vim-status-file"></span>
      <span id="vim-status-pos"></span>
    </div>
  </div>
  <script src="/js/vim-themes.js"></script>
  <script src="/js/vim-shell.js"></script>
  <script src="/js/vim-help.js"></script>
  <script src="/js/vim-tutor.js"></script>
  <script src="/js/vim.js"></script>
</body>
</html>
