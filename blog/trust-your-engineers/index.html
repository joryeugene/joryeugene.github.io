  <style>
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      color: #ffffff;
    }

    .container {
      max-width: 1000px;
      width: 100%;
      margin: 0;
      padding: 0;
      background-color: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }

    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 100%;
      line-height: 1.65;
      font-size: 17px;
      color: #ffffff;
      background-color: transparent;
      padding: 70px 20px 20px 20px;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 {
      margin-top: 1.5em;
      margin-bottom: 0.75em;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 0.5em;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .markdown-body h1 {
      font-size: 2em;
    }

    .markdown-body h2 {
      font-size: 1.6em;
    }

    .markdown-body a {
      color: #4db1ff;
      font-weight: 500;
    }

    .markdown-body code {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
      color: #e6e6e6;
    }

    .markdown-body table {
      border-collapse: collapse;
      margin: 1em 0;
      width: 100%;
      overflow: auto;
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .markdown-body table th,
    .markdown-body table td {
      padding: 10px 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
    }

    .markdown-body table th {
      background-color: rgba(255, 255, 255, 0.15);
      font-weight: 600;
    }

    .markdown-body table tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.05);
    }

    .markdown-body pre {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 16px;
      overflow: auto;
      font-size: 0.9em;
      line-height: 1.45;
      border-radius: 6px;
      color: #e6e6e6;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .markdown-body pre code {
      background-color: transparent;
      padding: 0;
      font-size: 100%;
      color: inherit;
    }

    .markdown-body blockquote {
      padding: 0 1em;
      color: #c9d1d9;
      border-left: 0.25em solid rgba(255, 255, 255, 0.3);
      margin: 1em 0;
      font-style: italic;
    }

    .markdown-body ul,
    .markdown-body ol {
      color: #ffffff;
      line-height: 1.8;
    }

    .markdown-body li {
      margin-bottom: 0.5em;
    }

    .markdown-body hr {
      height: 0.25em;
      padding: 0;
      margin: 2em 0;
      background-color: rgba(255, 255, 255, 0.2);
      border: 0;
    }

    .markdown-body p {
      line-height: 1.7;
      margin-bottom: 1em;
    }

    .markdown-body strong {
      color: #ffffff;
      font-weight: 600;
    }

    .markdown-body em {
      color: #f0f0f0;
    }

    /* Home link styles */
    .home-link {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #4db1ff;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 8px 16px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .home-link:hover {
      background-color: rgba(255, 255, 255, 0.2);
      color: #66c2ff;
      transform: translateY(-2px);
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      .markdown-body {
        padding: 60px 15px 20px 15px;
        font-size: 16px;
      }

      .home-link {
        top: 10px;
        left: 10px;
        font-size: 14px;
        padding: 6px 12px;
      }

      .markdown-body h1 {
        font-size: 1.75em;
      }

      .markdown-body h2 {
        font-size: 1.4em;
      }

      .markdown-body table {
        font-size: 14px;
      }

      .markdown-body pre {
        font-size: 0.85em;
      }
    }

    /* Enhanced readability for longer posts */
    .markdown-body {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
    }

    /* Link hover effects */
    .markdown-body a:hover {
      color: #66c2ff;
      text-decoration: underline;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    /* Background and change button styles */
    #bg {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      background-image: url('/jpg/bg.jpg');
      transition: background-image 0.8s ease-in-out;
      filter: brightness(0.45) contrast(1.05);
    }

    #change {
      right: 20px;
      bottom: 20px;
      height: 36px;
      width: 36px;
      cursor: pointer;
      fill: rgba(252, 249, 202, 0.8);
      position: fixed;
      transition: transform 0.4s ease-in-out, fill 0.3s ease-in-out, box-shadow 0.3s ease;
      z-index: 100;
      background-color: rgba(0, 0, 0, 0.2);
      padding: 8px;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    #change:hover {
      fill: rgba(255, 252, 220, 1);
      transform: rotate(-360deg);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const headerMappings = {};

      fetch('/blog/trust-your-engineers/trust-your-engineers.md')
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
          }
          return response.text();
        })
        .then(markdownText => {
          const html = marked.parse(markdownText);

          const container = document.createElement('div');
          container.innerHTML = html;

          // Add IDs to all headings
          const headings = container.querySelectorAll('h1, h2, h3, h4, h5, h6');
          headings.forEach(heading => {
            const headingText = heading.textContent;

            // Create a clean ID from the heading text
            let id = headingText
              .toLowerCase()
              .replace(/[^\w\s-]/g, '')  // Remove special characters
              .replace(/^\s+|\s+$/g, '') // Trim
              .replace(/\s+/g, '-');     // Replace spaces with hyphens

            // Keep emoji if present for the ID
            if (/[\u{1F300}-\u{1F6FF}\u{2600}-\u{26FF}]/u.test(headingText)) {
              // Extract emoji and add it to ID
              const emojiMatch = headingText.match(/^([\u{1F300}-\u{1F6FF}\u{2600}-\u{26FF}]+)/u);
              if (emojiMatch) {
                id = emojiMatch[0] + '-' + id;
              }
            }

            heading.id = id;
          });

          // Apply the processed HTML to the content div
          document.getElementById('content').innerHTML = container.innerHTML;

          // Fix the anchor links after content is loaded
          setTimeout(() => {
            const links = document.querySelectorAll('a[href^="#"]');

            links.forEach(link => {
              const href = link.getAttribute('href').substring(1);

              // Check if we have a direct mapping for this anchor
              if (headerMappings[href]) {
                link.href = '#' + headerMappings[href];
              }

              // Add smooth scrolling
              link.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href').substring(1);
                const targetElement = document.getElementById(targetId);

                if (targetElement) {
                  e.preventDefault();
                  window.scrollTo({
                    top: targetElement.offsetTop - 80,
                    behavior: 'smooth'
                  });

                  history.pushState(null, null, '#' + targetId);
                }
              });
            });
          }, 500);
        })
        .catch(error => {
          console.error('Error loading markdown:', error);
          document.getElementById('content').innerHTML = '<p>Error loading content. Please try again later.</p>';
        });

      BackgroundSwitcher.init({
        imagePath: '/jpg/',
        useContainer: false,
        buttonId: 'change'
      });
    });
  </script>
